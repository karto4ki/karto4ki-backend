services:
  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: identity-service
    volumes:
      - ./identity-service/config.yml:/app/config.yml:ro
      - ./keys:/app/keys:ro
    environment:
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - USER_SERVICE_ADDR=userservice:50051
    depends_on:
      - identity-redis
      - userservice
    restart: on-failure

  identity-redis:
    image: redis:latest
    container_name: identity-redis
    volumes:
      - identity_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/karto4ki-files;
      mc anonymous set download myminio/karto4ki-files;
      exit 0;
      "
    restart: "no"

  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: userdb
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  userservice:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: userservice
    depends_on:
      user-db:
        condition: service_healthy
      filestorage-service:
        condition: service_started
    environment:
      - DB_HOST=user-db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=userdb
      - DB_SSLMODE=disable
      - HTTP_PORT=8080
      - GRPC_PORT=50051
      - FILE_STORAGE_URL=http://filestorage-service:8081
    volumes:
      - ./user-service/config.yml:/app/config.yml:ro
      - ./keys:/app/keys:ro
    restart: on-failure

  user-flyway:
    image: flyway/flyway:latest
    container_name: user-flyway
    command: ["migrate"]
    environment:
      - FLYWAY_URL=jdbc:postgresql://user-db:5432/userdb
      - FLYWAY_USER=user
      - FLYWAY_PASSWORD=password
      - FLYWAY_LOCATIONS=filesystem:/app/migrations
      - FLYWAY_VALIDATE_MIGRATION_NAME=true
      - FLYWAY_BASELINE_ON_MIGRATE=true
    volumes:
      - ./user-service/migrations:/app/migrations
    depends_on:
      user-db:
        condition: service_healthy
    restart: "no"

  card-db:
    image: postgres:15
    container_name: card-db
    environment:
      POSTGRES_USER: card
      POSTGRES_PASSWORD: password
      POSTGRES_DB: carddb
    volumes:
      - card_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U card -d carddb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  card-service:
    build:
      context: .
      dockerfile: card-service/Dockerfile
    container_name: card-service
    depends_on:
      card-db:
        condition: service_healthy
      userservice:
        condition: service_started
    environment:
      - HTTP_PORT=8082
      - GRPC_PORT=50052
      - USER_SERVICE_URL=http://userservice:8080
    volumes:
      - ./card-service/config.yml:/app/config.yml:ro
      - ./keys:/app/keys:ro
    restart: on-failure

  card-flyway:
    image: flyway/flyway:latest
    container_name: card-flyway
    command: ["migrate"]
    environment:
      - FLYWAY_URL=jdbc:postgresql://card-db:5432/carddb
      - FLYWAY_USER=card
      - FLYWAY_PASSWORD=password
      - FLYWAY_LOCATIONS=filesystem:/app/migrations
      - FLYWAY_VALIDATE_MIGRATION_NAME=true
      - FLYWAY_BASELINE_ON_MIGRATE=true
    volumes:
      - ./card-service/migrations:/app/migrations
    depends_on:
      card-db:
        condition: service_healthy
    restart: "no"

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ai-service
    depends_on:
      - card-service
    volumes:
      - ./ai-service/config.yml:/app/config.yml:ro
      - ./keys:/app/keys:ro
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_MOCK=${LLM_MOCK:-false}
    restart: on-failure

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - identity-service
      - userservice
      - filestorage-service
      - card-service
    restart: on-failure

  filestorage-service:
    build:
      context: .
      dockerfile: filestorage-service/Dockerfile
    container_name: filestorage-service
    ports:
      - "9090:9090"
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - file_storage_data:/app/uploads
      - ./filestorage-service/config.yml:/app/config.yml:ro
      - ./keys:/app/keys:ro
    environment:
      - HTTP_PORT=8081
      - GRPC_SERVICE_PORT=9090
      - FILE_STORAGE_REDIS_ADDR=redis:6379
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: on-failure

volumes:
  identity_redis_data:
  user_db_data:
  card_db_data:
  file_storage_data:
  redis_data:
  minio_data: