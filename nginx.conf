events{
    worker_connections 1024;
}

http {
    underscores_in_headers on;

    # Timeouts for auth_request
    proxy_connect_timeout 5s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;

    server {
        listen 80;

        # SSL temporarily disabled for testing
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/ssl/self-signed.crt;
        # ssl_certificate_key /etc/nginx/ssl/self-signed.key;

        # SSL temporarily disabled
        # ssl_protocols TLSv1.2 TLSv.3;
        # ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        # ssl_prefer_server_ciphers off;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 10m;


        # Additional security headers (optional)
        # add_header Strict-Transport-Security "max-age=31536000; includeDomains" always;

        location / {
            return 200 "Hello World!";
        }

        location /api/identity/ {
            proxy_read_timeout 30s;
            proxy_pass http://identity-service:5000/;
        }

        location /api/user/v1.0/refresh-token {
            proxy_pass http://identity-service:5000/;
        }

        location /api/user/ {
            auth_request /auth;
            auth_request_set $x_internal_token $upstream_http_x_internal_token;

            proxy_set_header Authorization "";
            proxy_set_header X-Internal-Token $x_internal_token;
            proxy_pass http://userservice:8080/;
        }

        location /api/storage/ {
            auth_request /auth;
            auth_request_set $x_internal_token $upstream_http_x_internal_token;

            proxy_set_header Authorization "";
            proxy_set_header X-Internal-Token $x_internal_token;
            proxy_pass http://filestorage-service:8081/;
        }

        location ~ ^/api/storage/v1\.0/files/([^/]+)/raw$ {
            # Public raw file proxy through filestorage-service (no auth)
            rewrite ^/api/storage(.*)$ $1 break;
            proxy_pass http://filestorage-service:8081;
        }

        location /api/storage/v1.0/files/ {
            # Public access to files - no auth required for GET
            proxy_pass http://minio:9000/karto4ki-files/;
            proxy_set_header Host $host;
        }

        location /api/card/ {
            auth_request /auth;
            auth_request_set $x_internal_token $upstream_http_x_internal_token;

            proxy_set_header Authorization "";
            proxy_set_header X-Internal-Token $x_internal_token;
            proxy_pass http://card-service:8082/;
        }

        location /api/ai/ {
            auth_request /auth;
            auth_request_set $x_internal_token $upstream_http_x_internal_token;

            proxy_set_header Authorization "";
            proxy_set_header X-Internal-Token $x_internal_token;
            proxy_pass http://ai-service:8083/;
        }

        location /auth {
            proxy_pass http://identity-service:5000/v1.0/identity;
            proxy_pass_request_body off;
            proxy_set_header COntent-Length "";
            internal;
        }

        error_page 401 @401.json;
        location @401.json {
            default_type application/json;
            return 401 '{\n\t"error_type": "unauthorized",\n\t"error_message": "Unauthorized."\n}';
        }

        location @403.json {
            default_type application/json;
            return 403 '{\n\t"error_type":"forbidden",\n\t"error_message":"Forbidden. You dont have permission to access this resource."}';
        }

        error_page 404 @404.json;
        location @404.json {
            default_type application/json;
            return 404 '{\n\t"error_type": "not_found",\n\t"error_message": "Not Found"\n}';
        }

        error_page 413 @413.json;
        location @413.json {
            default_type application/json;
            return 413 '{"error_type":"body_too_large","error_message":"Request body is too large. Maximum allowed size is 11MB."}';
        }

        error_page 429 @429.json;
        location @429.json {
            default_type application/json;
            return 429 '{"error_type":"rate_limit_exceeded","error_message":"Too many requests. Please try again later."}';
        }
        
        error_page 500 @500.json;
        location @500.json {
            default_type application/json;
            return 500 '{\n\t"error_type": "internal_error",\n\t"error_message": "Internal Server Error (nginx)"\n}';
        }
        
        error_page 502 @502.json;
        location @502.json {
            default_type application/json;
            return 502 '{\n\t"error_type": "internal_error",\n\t"error_message": "Bad gateway (nginx)"\n}';
        }
    }
}