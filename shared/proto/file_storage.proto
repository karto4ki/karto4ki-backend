syntax = "proto3";

package filestorage;

option go_package = "github.com/karto4ki/karto4ki-backend/shared/proto/filestorage;filestorage";

import "google/protobuf/timestamp.proto";

// FileStorageService - gRPC сервис для работы с файлами
service FileStorageService {
  // Загрузка файла целиком (для файлов < 10MB)
  rpc UploadFile (UploadFileRequest) returns (UploadFileResponse);
  
  // Инициализация многокомпонентной загрузки
  rpc UploadInit (UploadInitRequest) returns (UploadInitResponse);
  
  // Загрузка части файла
  rpc UploadPart (UploadPartRequest) returns (UploadPartResponse);
  
  // Завершение многокомпонентной загрузки
  rpc UploadComplete (UploadCompleteRequest) returns (UploadCompleteResponse);
  
  // Отмена загрузки
  rpc UploadAbort (UploadAbortRequest) returns (UploadAbortResponse);
  
  // Получение информации о файле
  rpc GetFile (GetFileRequest) returns (GetFileResponse);
  
  // Удаление файла
  rpc DeleteFile (DeleteFileRequest) returns (DeleteFileResponse);
}

// Типы файлов
enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_AVATAR = 1;
  FILE_TYPE_CARD_IMAGE = 2;
  FILE_TYPE_DOCUMENT = 3;
  FILE_TYPE_OTHER = 4;
}

// ========== UploadFile ==========

message UploadFileRequest {
  bytes data = 1;
  string file_name = 2;
  string mime_type = 3;
  FileType file_type = 4;
  string owner_id = 5;
}

message UploadFileResponse {
  string file_id = 1;
  string file_url = 2;
  FileType file_type = 3;
  int64 file_size = 4;
  string mime_type = 5;
  google.protobuf.Timestamp created_at = 6;
}

// ========== UploadInit ==========

message UploadInitRequest {
  string file_name = 1;
  string mime_type = 2;
  FileType file_type = 3;
  string owner_id = 4;
  int64 total_size = 5;
}

message UploadInitResponse {
  string upload_id = 1;
  int64 chunk_size = 2;
  int32 total_chunks = 3;
}

// ========== UploadPart ==========

message UploadPartRequest {
  string upload_id = 1;
  int32 part_number = 2;
  bytes data = 3;
}

message UploadPartResponse {
  string e_tag = 1;
}

// ========== UploadComplete ==========

message UploadPartInfo {
  int32 part_number = 1;
  string e_tag = 2;
}

message UploadCompleteRequest {
  string upload_id = 1;
  repeated UploadPartInfo parts = 2;
}

message UploadCompleteResponse {
  string file_id = 1;
  string file_url = 2;
  FileType file_type = 3;
  int64 file_size = 4;
  string mime_type = 5;
  google.protobuf.Timestamp created_at = 6;
}

// ========== UploadAbort ==========

message UploadAbortRequest {
  string upload_id = 1;
}

message UploadAbortResponse {
}

// ========== GetFile ==========

message GetFileRequest {
  string file_id = 1;
}

message GetFileResponse {
  string file_id = 1;
  string file_url = 2;
  string owner_id = 3;
  FileType file_type = 4;
  int64 file_size = 5;
  string mime_type = 6;
  google.protobuf.Timestamp created_at = 7;
}

// ========== DeleteFile ==========

message DeleteFileRequest {
  string file_id = 1;
}

message DeleteFileResponse {
}
