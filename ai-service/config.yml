http_port: 8083

llm:
  provider: openrouter
  api_key: ""
  base_url: https://openrouter.ai/api/v1
  model: openai/gpt-4o-mini
  vision: true  # Поддержка мультимодальных моделей (изображения + текст)

  # Несколько провайдеров с приоритетами (опционально)
  # providers:
  #   - name: openrouter
  #     priority: 1
  #     api_key: ""
  #     base_url: https://openrouter.ai/api/v1
  #     model: openai/gpt-4o-mini
  #     vision: true
  #   - name: yandexgpt
  #     priority: 2
  #     api_key: ""
  #     base_url: https://llm.api.cloud.yandex.net/foundationModels/v1
  #     model: yandexgpt-lite
  #     vision: false

generation:
  default_card_count: 5
  max_card_count: 150
  min_card_count: 1
  default_difficulty: intermediate
  default_language: ru

pdf:
  max_file_size_mb: 10
  min_text_length: 100

vision:
  max_file_size_mb: 10
  min_text_length: 20
  supported_formats:
    - image/jpeg
    - image/png
    - image/webp
  default_language: ru

card_service:
  grpc_address: card-service:50052
  timeout: 30s

redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  task_ttl_hours: 24

kafka:
  brokers:
    - kafka:29092
  consumer_group: ai-workers
  topics:
    generation_tasks: "ai.generation.tasks"
    generation_events: "ai.generation.events"
  consumer:
    concurrency: 3
    max_retries: 3
    retry_delay_ms: 1000
  producer:
    required_acks: 1
    timeout_ms: 5000

jwt:
  signing_method: RS256
  lifetime: 1m
  issuer: identity_service
  audience:
    - identity_service
  key_file_path: /app/keys/rsa.pub
