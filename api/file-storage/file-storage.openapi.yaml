openapi: 3.0.3
info:
  title: File Storage REST API
  description: File Storage Service for image upload and management
  version: "1.0"
servers:
  - url: http://localhost:80/api/storage/v1.0/
tags:
  - name: files
  - name: images
paths:
  /upload:
    post:
      summary: Upload a file
      description: Upload a file (image or other). Returns file ID and URL.
      tags:
        - files
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /files/{fileId}:
    get:
      summary: Get file info
      description: Get file metadata by ID.
      tags:
        - files
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FileInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete file
      description: Delete file by ID.
      tags:
        - files
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /files/{fileId}/raw:
    get:
      summary: Get raw file content
      description: Download raw file content.
      tags:
        - files
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /images/{imageId}/resize:
    get:
      summary: Get resized image
      description: Get resized version of an image.
      tags:
        - images
      security:
        - bearerAuth: []
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
        - name: width
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 4096
        - name: height
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 4096
        - name: fit
          in: query
          required: false
          schema:
            type: string
            enum: [cover, contain, fill]
            default: cover
      responses:
        '200':
          description: OK
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /images/{imageId}/thumbnail:
    get:
      summary: Get image thumbnail
      description: Get thumbnail version of an image (fixed sizes).
      tags:
        - images
      security:
        - bearerAuth: []
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
        - name: size
          in: query
          required: false
          schema:
            type: string
            enum: [small, medium, large]
            default: small
      responses:
        '200':
          description: OK
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
          description: File to upload
        type:
          type: string
          enum: [avatar, card_image, document, other]
          default: other
      required:
        - file
    FileUploadResponse:
      type: object
      properties:
        file_id:
          type: string
        file_url:
          type: string
        file_type:
          type: string
        file_size:
          type: integer
          format: int64
        mime_type:
          type: string
        created_at:
          type: string
          format: date-time
    FileInfo:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
          format: uuid
        file_type:
          type: string
        file_size:
          type: integer
          format: int64
        mime_type:
          type: string
        url:
          type: string
        thumbnail_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error_type:
          type: string
        error_message:
          type: string
