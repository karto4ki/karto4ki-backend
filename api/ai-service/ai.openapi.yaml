openapi: 3.0.3
info:
  title: AI Service API
  description: AI-powered flashcard generation API for Karto4ki
  version: "1.0"
servers:
  - url: http://localhost:80/api/ai/v1.0/
tags:
  - name: generate
    description: AI generation endpoints
paths:
  /generate-cards:
    post:
      summary: Generate flashcards from text
      description: |
        Generate flashcards from provided text using AI.
        Creates a new card set in Card Service asynchronously.
        
        Returns a task_id that can be used to poll for progress status.
        
        Possible `error_type` values:
        - `invalid_json`
        - `validation_failed`
        - `unauthorized`
        - `internal`
      tags:
        - generate
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCardsRequest'
      responses:
        '202':
          description: Accepted - Generation task started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GenerationTaskStarted'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generate-cards/status/{task_id}:
    get:
      summary: Get generation task status
      description: |
        Poll for the current status of a card generation task.
        
        Returns progress percentage (0-100), current status, and generated cards when complete.
        
        Possible `error_type` values:
        - `not_found` (task_id doesn't exist)
        - `internal`
      tags:
        - generate
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GenerationTask'
        '404':
          description: Task Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generate-cards-from-pdf:
    post:
      summary: Generate flashcards from PDF file
      description: |
        Extract text from uploaded PDF file and generate flashcards using AI.
        Creates a new card set in Card Service and returns generated cards.

        Possible `error_type` values:
        - `validation_failed` (file too large, insufficient text)
        - `unauthorized`
        - `internal`
      tags:
        - generate
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GenerateCardsFromPDFRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GenerateCardsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generate-quiz:
    post:
      summary: Generate quiz from text
      description: |
        Generate multiple-choice quiz questions from provided text.
        
        Possible `error_type` values:
        - `invalid_json`
        - `validation_failed`
        - `unauthorized`
        - `internal`
      tags:
        - generate
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateQuizRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GenerateQuizResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /summarize:
    post:
      summary: Summarize text
      description: |
        Create a concise summary of the provided text.
        
        Possible `error_type` values:
        - `invalid_json`
        - `validation_failed`
        - `unauthorized`
        - `internal`
      tags:
        - generate
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummarizeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SummarizeResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    GenerateCardsRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Text to generate cards from
          minLength: 1
          maxLength: 50000
          example: "Квантовая механика — раздел физики, изучающий квантовые системы..."
        card_count:
          type: integer
          description: Number of cards to generate (default: 5)
          minimum: 1
          maximum: 150
          default: 5
          example: 5
        difficulty:
          type: string
          description: Difficulty level
          enum: [easy, intermediate, advanced]
          default: intermediate
          example: "intermediate"
        language:
          type: string
          description: Language code (ISO 639-1)
          default: "ru"
          example: "ru"
        set_name:
          type: string
          description: Name for the generated card set
          maxLength: 100
          example: "Квантовая механика"
        set_description:
          type: string
          description: Description for the generated card set
          maxLength: 500
          nullable: true

    GenerateCardsFromPDFRequest:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
          description: PDF file to extract text from (max 10MB)
        card_count:
          type: integer
          description: Number of cards to generate (default: 5)
          minimum: 1
          maximum: 150
          default: 5
        difficulty:
          type: string
          description: Difficulty level
          enum: [easy, intermediate, advanced]
          default: intermediate
        language:
          type: string
          description: Language code (ISO 639-1)
          default: "ru"
        set_name:
          type: string
          description: Name for the generated card set
          default: "PDF Generated Set"
        set_description:
          type: string
          description: Description for the generated card set
          nullable: true

    GenerateCardsResponse:
      type: object
      properties:
        set_id:
          type: string
          format: uuid
          description: ID of the created card set
        set_name:
          type: string
          description: Name of the card set
        cards:
          type: array
          items:
            $ref: '#/components/schemas/GeneratedCard'

    GeneratedCard:
      type: object
      properties:
        front:
          type: string
          description: Question side of the card
        back:
          type: string
          description: Answer side of the card

    GenerateQuizRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 50000
        question_count:
          type: integer
          minimum: 1
          maximum: 150
          default: 5
        difficulty:
          type: string
          enum: [easy, intermediate, advanced]
          default: intermediate
        language:
          type: string
          default: "ru"

    GenerateQuizResponse:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestion'

    QuizQuestion:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
          minItems: 4
          maxItems: 4
        answer:
          type: string
        explanation:
          type: string
          nullable: true

    SummarizeRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 50000
        language:
          type: string
          default: "ru"

    SummarizeResponse:
      type: object
      properties:
        summary:
          type: string

    GenerationTaskStarted:
      type: object
      description: Response when a generation task is started asynchronously
      properties:
        task_id:
          type: string
          format: uuid
          description: Unique identifier for tracking generation progress
        status:
          type: string
          enum: [pending]
          description: Initial status of the task
      required:
        - task_id
        - status

    GenerationTask:
      type: object
      description: Current state of a card generation task
      properties:
        task_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
          description: Current task status
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Completion percentage (0-100)
        total_cards:
          type: integer
          description: Total number of cards to generate
        generated_cards:
          type: integer
          description: Number of cards generated so far
        set_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the created card set (only when completed)
        set_name:
          type: string
          description: Name of the generated card set
        error:
          type: string
          nullable: true
          description: Error message if task failed
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
      required:
        - task_id
        - user_id
        - status
        - progress
        - total_cards
        - generated_cards
        - set_name
        - created_at
        - updated_at

    ErrorResponse:
      type: object
      properties:
        error_type:
          type: string
        error_message:
          type: string

    ErrorResponseWithDetails:
      type: object
      properties:
        error_type:
          type: string
        error_message:
          type: string
        error_details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
